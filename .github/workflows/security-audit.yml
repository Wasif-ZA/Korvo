name: Scheduled Security Audit

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm audit --omit=dev
