version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      next:
        patterns: ["next", "next-*", "@next/*"]
      prisma:
        patterns: ["prisma", "@prisma/*"]
      testing:
        patterns: ["vitest", "@vitest/*", "playwright", "@playwright/*", "@testing-library/*"]
      supabase:
        patterns: ["@supabase/*"]
      stripe:
        patterns: ["stripe", "@stripe/*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
